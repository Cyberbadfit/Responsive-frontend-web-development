<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON CONNECT 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-ambient"></div>
  <div class="noise"></div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p class="title-font neon-text">LOADING...</p>
  </div>

  <main class="app-shell fade-in">
    <section class="glass-card">
      <h1 class="title-font neon-text hero-title">NEON C4</h1>
      <p class="subtitle">CONNECT · FOUR · FUTURE</p>

      <div class="controls">
        <button data-diff="easy" class="diffBtn btn cyan">EASY</button>
        <button data-diff="medium" class="diffBtn btn purple">MEDIUM</button>
        <button data-diff="hard" class="diffBtn btn pink">HARD</button>
      </div>

      <div id="status" class="status title-font">YOUR TURN</div>
      <div id="board" class="board"></div>

      <div class="footer-actions">
        <button id="reset" class="btn primary title-font">NEW GAME</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
